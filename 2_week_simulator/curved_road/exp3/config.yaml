experiment: exp3
description: "ACT + CVAE — curved road"

data:
  training_data_dir: curved_road/exp3/training-data
  val_split: 0.2
  seed: 42

model:
  cnn_variant: 3conv
  feature_dim: 64
  transformer_d_model: 64
  transformer_nhead: 4
  transformer_num_layers: 2
  chunk_size: 10
  latent_dim: 32
  cvae_beta: 1.0
  num_actions: 4

training:
  epochs: 80
  batch_size: 32
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine

results_dir: results/curved_road/exp3
