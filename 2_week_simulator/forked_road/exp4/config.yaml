experiment: exp4
description: "Vision CNN (4-conv + MLP) — forked road baseline"

data:
  training_data_dir: forked_road/exp4/training-data
  val_split: 0.2
  seed: 42

model:
  cnn_variant: 4conv
  feature_dim: 128
  mlp_hidden_dim: 64
  num_actions: 4

training:
  epochs: 80
  batch_size: 32
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine

results_dir: results/forked_road/exp4
